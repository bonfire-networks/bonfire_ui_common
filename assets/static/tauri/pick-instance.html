<!DOCTYPE html>
<html data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Bonfire</title>
    <link href="assets/dist/styles.css" rel="stylesheet" />
    <style>
        #main, #main-iframe {
            width: 100%;
            height: 100vh;
            border: 0;
            overflow: visible;
        }
        /* Keep the login card inside notch/home-indicator safe areas on mobile */
        #picker {
            padding: calc(env(safe-area-inset-top, 0px) + 1rem)
                     calc(env(safe-area-inset-right, 0px) + 1rem)
                     calc(env(safe-area-inset-bottom, 0px) + 1rem)
                     calc(env(safe-area-inset-left, 0px) + 1rem);
            box-sizing: border-box;
        }
    </style>
</head>

<body>

<div id="main">
    <div id="loading" class="flex items-center justify-center h-screen">
        <span class="loading loading-spinner loading-lg"></span>
    </div>

    <div id="picker" style="display:none;" class="flex items-center justify-center h-screen">
        <form id="login-form" class="card bg-base-200 shadow-xl w-full max-w-md">
            <div class="card-body items-center text-center gap-4">
                <h2 class="card-title text-2xl">Welcome to Bonfire</h2>
                <p class="text-base-content/70">Enter your username in the format <code class="kbd kbd-sm">@user@instance.domain</code></p>
                <input type="text" id="usernameInput" placeholder="@username@yourinstance.domain"
                    class="input input-bordered w-full" />
                <div class="card-actions w-full">
                    <button type="submit" class="btn btn-primary w-full">Log in</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="assets/tauri-init.js"></script>
<script type="module">
    import {
        startLogin,
        handleLogin
    } from './assets/ap_c2s_client/js/dist/activitypub/auth.js'

    // Load saved username on startup
    const saved = localStorage.getItem('appUsername') || localStorage.getItem('appUrl') || '';
    document.getElementById('usernameInput').value = saved;

    function getClientId() {
        let clientId = localStorage.getItem('appClientId');
        if (!clientId) {
//             clientId = window.location.origin + '/client.jsonld';
        	clientId = "https://bonfirenetworks.org/.well-known/client.jsonld";

            localStorage.setItem('appClientId', clientId); 
        }
        return clientId;
    }

    function getRedirectUri() {
        // Must match redirect_uris in the CIMD document at bonfirenetworks.org/.well-known/client.jsonld
        // The local shell origin differs per platform (tauri://localhost on macOS/iOS,
        // http://tauri.localhost on Windows/Android, http://localhost:1430 in dev),
        // so derive it instead of hardcoding.
        return window.__TAURI__ ? window.location.origin + "/" : window.location.origin;
    }

    // Set WASM base path for Tauri (bundled resources served via asset protocol)
    if (window.__TAURI__) {
        localStorage.setItem('wasmBasePath', 'false');
        // localStorage.setItem('wasmBasePath', '/assets/openmls/');
    }

    function cleanup() {
        const keys = [
            'actor_id', 'appUsername', 'appUrl',
            'token_endpoint', 'authorization_endpoint', 'proxy_url',
            'access_token', 'appClientId', 'clientId', 'wasmBasePath'
        ];
        keys.forEach(k => localStorage.removeItem(k));
        sessionStorage.removeItem('code_verifier');
        sessionStorage.removeItem('state');
        console.log('[cleanup] Cleared auth/session keys');
    }
    window.cleanup = cleanup;

    async function loggedIn() {
        const appUrl = localStorage.getItem('appUrl');

        console.log("Logged in, go to appUrl:", appUrl);

        if (!appUrl) return;

        // Update window title with username so multiple instances are distinguishable
        const username = localStorage.getItem('appUsername') || appUrl;
        if (window.__TAURI__) {
            window.__TAURI__.window.getCurrentWindow().setTitle(`Bonfire - ${username}`).catch(() => {});
        }

        // Register instance domain for https:// deep links (best-effort, unsupported on macOS)
        try {
            const instanceHost = new URL('https://' + appUrl).hostname;
            await window.__TAURI__.core.invoke('register_deep_link_domain', { domain: instanceHost });
        } catch (e) {
            console.warn('Failed to register deep-link domain:', e);
        }

        // Start SSE notification listener
        window.__TAURI__.core.invoke('start_notifications', {
            instanceUrl: 'https://' + appUrl,
            token: localStorage.getItem('access_token')
        });

        // Check for a startup deep link, otherwise go to dashboard
        const baseUrl = 'https://' + appUrl;
        let startupPayload = null;
        try {
            startupPayload = await window.__TAURI__.core.invoke('get_startup_deep_link');
        } catch (e) { /* no pending deep link */ }

        // __BONFIRE_PLATFORM__ ('ios' | 'android') is injected by the mobile shell —
        // UA sniffing can't detect iPads (WKWebView reports macOS); undefined = desktop.
        // iOS has no chat tab (pure instance client for now). On Android the single
        // webview is shared, so navigating to the instance would overwrite the chat
        // page; on desktop chat is a separate window and both can happen.
        const platform = window.__BONFIRE_PLATFORM__;
        const hasChatTab = platform !== 'ios';
        const sharedWebview = platform === 'android';

        const chatDeepLink = startupPayload && startupPayload.target_tab === 'chat' && hasChatTab;
        if (!chatDeepLink && startupPayload && startupPayload.path) {
            // Bonfire deep link — navigate to the path on the instance
            window.location.href = new URL('/' + startupPayload.path, baseUrl).href;
        } else {
            // Open chat on login (and for MLS deep links, which navigate to the
            // group once chat loads), then show the instance where possible
            if (hasChatTab) {
                await window.__TAURI__.core.invoke('open_secure_chat').catch(e => console.warn('[loggedIn] open_secure_chat:', e));
            }
            if (!sharedWebview) {
                window.location.href = new URL("/dashboard", baseUrl).href;
            }
        }
    }

    // Handle logout action from tray menu or app-logout event
    if (window.location.hash === '#logout') {
        window.location.hash = '';
        cleanup();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('picker').style.display = 'flex';
        document.getElementById('usernameInput').value = '';
    }
    // Handle OAuth callback (redirected back with ?code=...&state=...)
    else if (new URLSearchParams(window.location.search).get('code')) {
        try {
            await handleLogin({
                clientId: getClientId(),
                redirectUri: getRedirectUri()
            });
            console.log("OAuth login done");
            loggedIn();
        } catch (err) {
            console.error('[pick-instance] Token exchange failed:', err);
        }
    } else if (localStorage.getItem('access_token') && localStorage.getItem('appUrl')) {
        console.log("Already logged in from a previous session");
        loggedIn();
    } else {
        // Show the login form if not already logged in or in the middle of OAuth flow
        document.getElementById('loading').style.display = 'none';
        document.getElementById('picker').style.display = 'flex';
    }

    // Login flow: resolve actor via webfinger, then redirect to OAuth authorize
    document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const input = document.getElementById('usernameInput').value.trim();
        if (!input) return;

        try {
            const url = await startLogin(input, getClientId(), getRedirectUri());
            window.location.href = url;
        } catch (err) {
            console.error('[pick-instance] Login error:', err);
            alert(err.message || 'Login failed');
        }
    });

</script>
</body>

</html>
